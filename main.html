<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frise d'Idées</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: #2a2a35;
    --accent: #c8a96e;
    --accent2: #7eb8c8;
    --accent3: #c87eb8;
    --text: #e8e4dc;
    --text-muted: #6e6a64;
    --timeline: #2a2a35;
    --bubble-h: 140px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--accent);
  }
  header h1 span { color: var(--text-muted); font-weight: 400; font-size: 1rem; }
  .header-actions { display: flex; gap: 10px; }

  button {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    transition: all 0.18s ease;
  }
  .btn-primary {
    background: var(--accent);
    color: #0d0d0f;
    font-weight: 500;
  }
  .btn-primary:hover { background: #d9bb80; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: transparent; color: #c87e7e; border: 1px solid #c87e7e33; font-size: 0.7rem; padding: 4px 8px; }
  .btn-danger:hover { background: #c87e7e22; }

  /* LAYOUT */
  main { display: flex; flex-direction: column; height: calc(100vh - 60px); }

  /* PARKING (idées en attente) */
  #parking-zone {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    min-height: 60px;
    transition: min-height 0.3s ease;
  }
  #parking-zone.collapsed { min-height: 0; padding: 0 32px; overflow: hidden; }
  .parking-header {
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; user-select: none;
    padding: 4px 0;
  }
  .parking-header h2 {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .parking-header .count {
    background: var(--accent);
    color: #0d0d0f;
    border-radius: 100px;
    font-size: 0.65rem;
    padding: 1px 7px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
  }
  .parking-toggle { color: var(--text-muted); font-size: 0.8rem; margin-left: auto; transition: transform 0.2s; }
  #parking-zone.collapsed .parking-toggle { transform: rotate(-90deg); }

  #parking-chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding-top: 10px;
  }
  .parking-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 0.8rem;
    display: flex; align-items: center; gap: 8px;
    cursor: grab;
    transition: all 0.15s;
  }
  .parking-chip:hover { border-color: var(--accent2); color: var(--accent2); }
  .parking-chip .chip-promote {
    font-size: 0.65rem; color: var(--text-muted);
    cursor: pointer; padding: 2px 5px;
    border-radius: 4px;
  }
  .parking-chip .chip-promote:hover { background: var(--accent2)22; color: var(--accent2); }
  .parking-chip .chip-del { color: var(--text-muted); cursor: pointer; }
  .parking-chip .chip-del:hover { color: #c87e7e; }

  /* TIMELINE AREA */
  #timeline-wrapper {
    flex: 1;
    overflow-x: auto;
    overflow-y: auto;
    position: relative;
    padding: 40px 60px 80px;
  }
  #timeline-canvas {
    position: relative;
    min-width: 100%;
    min-height: 320px;
  }

  /* THE LINE */
  #timeline-line {
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--timeline) 5%, var(--timeline) 95%, transparent);
    transform: translateY(-50%);
    pointer-events: none;
  }
  #timeline-line::before {
    content: '';
    position: absolute;
    right: 0; top: -3px;
    border-left: 8px solid var(--timeline);
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
  }

  /* IDEA BUBBLES */
  .bubble-wrapper {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform: translateX(-50%);
    cursor: grab;
    user-select: none;
    z-index: 10;
  }
  .bubble-wrapper.above { top: auto; bottom: 50%; padding-bottom: 24px; }
  .bubble-wrapper.below { top: 50%; padding-top: 24px; }
  .bubble-wrapper.above .connector { order: 1; }
  .bubble-wrapper.above .bubble { order: 0; }

  .connector {
    width: 2px;
    height: 24px;
    background: var(--border);
    flex-shrink: 0;
  }
  .bubble-wrapper.above .connector { margin-bottom: 0; }

  .bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    width: 180px;
    min-height: 90px;
    position: relative;
    transition: border-color 0.2s, box-shadow 0.2s;
    display: flex; flex-direction: column; gap: 6px;
  }
  .bubble:hover { border-color: var(--accent); box-shadow: 0 0 20px #c8a96e18; }
  .bubble-wrapper.dragging .bubble {
    border-color: var(--accent2);
    box-shadow: 0 8px 32px #0008;
    opacity: 0.9;
  }

  .bubble-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 2px;
  }
  .bubble-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
    word-break: break-word;
  }
  .bubble-links { display: flex; flex-direction: column; gap: 3px; margin-top: 4px; }
  .bubble-link {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.72rem;
    color: var(--accent2);
    cursor: pointer;
    text-decoration: none;
    padding: 2px 4px;
    border-radius: 4px;
    transition: background 0.15s;
    word-break: break-word;
  }
  .bubble-link:hover { background: var(--accent2)18; }
  .bubble-link::before { content: '↗'; font-size: 0.65rem; flex-shrink: 0; }

  .bubble-actions {
    position: absolute;
    top: 6px; right: 6px;
    display: flex; gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .bubble:hover .bubble-actions { opacity: 1; }
  .bubble-action-btn {
    width: 22px; height: 22px; border-radius: 5px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 0.7rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    padding: 0;
  }
  .bubble-action-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* DOT ON TIMELINE */
  .timeline-dot {
    position: absolute;
    top: 50%;
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    transition: all 0.2s;
  }

  /* ADD BUTTON ON TIMELINE */
  .add-here-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 28px; height: 28px;
    background: var(--surface2);
    border: 1px dashed var(--border);
    border-radius: 50%;
    color: var(--text-muted);
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    z-index: 5;
    padding: 0;
  }
  .add-here-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent)12; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: #000a;
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 420px;
    max-width: 95vw;
    transform: translateY(10px);
    transition: transform 0.2s;
    display: flex; flex-direction: column; gap: 16px;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--accent);
  }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .form-group input, .form-group textarea, .form-group select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }

  .links-editor { display: flex; flex-direction: column; gap: 6px; }
  .link-row { display: flex; gap: 6px; align-items: center; }
  .link-row input { flex: 1; }
  .link-row button { flex-shrink: 0; }

  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; }

  /* EDITOR PANEL */
  #editor-panel {
    position: fixed;
    top: 0; right: -660px;
    width: 640px;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 500;
    display: flex; flex-direction: column;
    transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
    box-shadow: -20px 0 60px #0006;
  }
  #editor-panel.open { right: 0; }

  .editor-header {
    display: flex; align-items: center; gap: 12px;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .editor-header h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--accent2);
    flex: 1;
    word-break: break-word;
  }
  .editor-close {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); width: 32px; height: 32px;
    border-radius: 8px; font-size: 1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;
  }
  .editor-close:hover { border-color: #c87e7e; color: #c87e7e; }

  .editor-toolbar {
    display: flex; gap: 4px; flex-wrap: wrap;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .toolbar-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 10px;
    border-radius: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.12s;
  }
  .toolbar-btn:hover { border-color: var(--accent2); color: var(--accent2); background: var(--accent2)10; }

  #editor-content {
    flex: 1;
    padding: 24px;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--text);
    overflow-y: auto;
    background: var(--bg);
  }
  #editor-content h1, #editor-content h2, #editor-content h3 {
    font-family: 'Playfair Display', serif;
    color: var(--accent);
    margin: 16px 0 8px;
  }
  #editor-content a { color: var(--accent2); }
  #editor-content ul, #editor-content ol { padding-left: 20px; }
  #editor-content blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    color: var(--text-muted);
    font-style: italic;
  }
  #editor-content[contenteditable=true]:empty::before {
    content: 'Développez votre idée ici…';
    color: var(--text-muted);
    font-style: italic;
    pointer-events: none;
  }
  .editor-footer {
    padding: 12px 24px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
  }
  .editor-footer span { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--text-muted); }
  .saved-indicator { color: var(--accent2); }

  /* EMPTY STATE */
  #empty-state {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    opacity: 0.5;
  }
  #empty-state h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--text-muted); margin-bottom: 8px; }
  #empty-state p { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--text-muted); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  /* Drop zone highlight */
  #timeline-canvas.drag-over { background: #c8a96e08; }

  .context-dot { position: absolute; bottom: 6px; right: 6px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); opacity: 0; transition: opacity 0.2s; }
  .bubble:hover .context-dot { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>Frise d'Idées <span>— espace de pensée</span></h1>
  <div class="header-actions">
    <button class="btn-ghost" onclick="openParkingModal()">+ Idée en attente</button>
    <button class="btn-primary" onclick="openBubbleModal()">+ Ajouter à la frise</button>
  </div>
</header>

<main>
  <!-- PARKING -->
  <div id="parking-zone">
    <div class="parking-header" onclick="toggleParking()">
      <h2>Idées en attente</h2>
      <span class="count" id="parking-count">0</span>
      <span class="parking-toggle">▼</span>
    </div>
    <div id="parking-chips"></div>
  </div>

  <!-- TIMELINE -->
  <div id="timeline-wrapper">
    <div id="timeline-canvas">
      <div id="timeline-line"></div>
      <div id="empty-state">
        <h2>Aucune idée sur la frise</h2>
        <p>Cliquez sur « + Ajouter à la frise » pour commencer</p>
      </div>
    </div>
  </div>
</main>

<!-- MODAL: Bubble -->
<div class="modal-overlay" id="bubble-modal">
  <div class="modal">
    <h3 id="modal-title">Nouvelle idée</h3>
    <div class="form-group">
      <label>Titre de l'idée</label>
      <input type="text" id="bubble-title-input" placeholder="Mon idée..." maxlength="60">
    </div>
    <div class="form-group">
      <label>Étiquette (optionnel)</label>
      <input type="text" id="bubble-tag-input" placeholder="ex: Projet, Réflexion..." maxlength="20">
    </div>
    <div class="form-group">
      <label>Position sur la frise</label>
      <select id="bubble-position-input">
        <option value="end">À la fin</option>
        <option value="start">Au début</option>
      </select>
    </div>
    <div class="form-group">
      <label>Sens (optionnel)</label>
      <select id="bubble-side-input">
        <option value="above">Au-dessus</option>
        <option value="below">En dessous</option>
      </select>
    </div>
    <div class="form-group">
      <label>Liens / Sous-idées</label>
      <div class="links-editor" id="links-editor">
        <div class="link-row">
          <input type="text" placeholder="Nom du lien..." class="link-label-input">
          <button class="btn-ghost" onclick="addLinkRow()" style="padding:6px 10px">+</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('bubble-modal')">Annuler</button>
      <button class="btn-primary" onclick="saveBubble()">Ajouter</button>
    </div>
  </div>
</div>

<!-- MODAL: Parking -->
<div class="modal-overlay" id="parking-modal">
  <div class="modal">
    <h3>Idée en attente</h3>
    <div class="form-group">
      <label>Votre idée</label>
      <input type="text" id="parking-input" placeholder="Une idée à ne pas oublier..." maxlength="80">
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('parking-modal')">Annuler</button>
      <button class="btn-primary" onclick="saveParking()">Mettre en attente</button>
    </div>
  </div>
</div>

<!-- EDITOR PANEL -->
<div id="editor-panel">
  <div class="editor-header">
    <h3 id="editor-title">Sous-idée</h3>
    <button class="editor-close" onclick="closeEditor()">✕</button>
  </div>
  <div class="editor-toolbar">
    <button class="toolbar-btn" onclick="execCmd('bold')"><b>G</b></button>
    <button class="toolbar-btn" onclick="execCmd('italic')"><i>I</i></button>
    <button class="toolbar-btn" onclick="execCmd('underline')"><u>S</u></button>
    <button class="toolbar-btn" onclick="execCmd('strikeThrough')">S̶</button>
    <button class="toolbar-btn" onclick="execCmd('insertOrderedList')">1.</button>
    <button class="toolbar-btn" onclick="execCmd('insertUnorderedList')">•</button>
    <button class="toolbar-btn" onclick="execCmd('formatBlock','h2')">H2</button>
    <button class="toolbar-btn" onclick="execCmd('formatBlock','h3')">H3</button>
    <button class="toolbar-btn" onclick="execCmd('formatBlock','blockquote')">"</button>
    <button class="toolbar-btn" onclick="execCmd('removeFormat')">⌫</button>
    <button class="toolbar-btn" onclick="insertHR()">—</button>
  </div>
  <div id="editor-content" contenteditable="true"></div>
  <div class="editor-footer">
    <span id="save-status" class="saved-indicator">● Sauvegardé</span>
    <button class="btn-danger" onclick="clearEditor()">Effacer le contenu</button>
  </div>
</div>

<script>
// ========== STATE ==========
let state = {
  bubbles: [],   // { id, title, tag, side, x, links: [{label, content}] }
  parking: [],   // { id, text }
  nextId: 1,
  editingBubble: null,
  currentEditorKey: null,  // "bubbleId-linkIndex"
};

function loadState() {
  try {
    const saved = localStorage.getItem('frise-idees-v2');
    if (saved) state = { ...state, ...JSON.parse(saved) };
  } catch(e) {}
}
function saveState() {
  localStorage.setItem('frise-idees-v2', JSON.stringify(state));
}

// ========== RENDER ==========
function render() {
  renderParking();
  renderTimeline();
  saveState();
}

function renderParking() {
  const chips = document.getElementById('parking-chips');
  const count = document.getElementById('parking-count');
  count.textContent = state.parking.length;
  chips.innerHTML = '';
  state.parking.forEach(p => {
    const chip = document.createElement('div');
    chip.className = 'parking-chip';
    chip.innerHTML = `
      <span>${escHtml(p.text)}</span>
      <span class="chip-promote" title="Ajouter à la frise" onclick="promoteParking('${p.id}')">→ frise</span>
      <span class="chip-del" onclick="deleteParking('${p.id}')">✕</span>
    `;
    chips.appendChild(chip);
  });
}

function renderTimeline() {
  const canvas = document.getElementById('timeline-canvas');
  // Remove old bubbles
  canvas.querySelectorAll('.bubble-wrapper, .timeline-dot, .add-here-btn').forEach(el => el.remove());

  const empty = document.getElementById('empty-state');
  empty.style.display = state.bubbles.length === 0 ? 'block' : 'none';

  if (state.bubbles.length === 0) return;

  // Layout bubbles
  const MARGIN = 80;
  const GAP = 220;
  const canvasWidth = Math.max(MARGIN * 2 + state.bubbles.length * GAP, document.getElementById('timeline-wrapper').offsetWidth);
  canvas.style.width = canvasWidth + 'px';

  // Assign x positions if not set
  state.bubbles.forEach((b, i) => {
    if (b.x === undefined || b.x === null) {
      b.x = MARGIN + i * GAP;
    }
  });

  // Sort by x
  state.bubbles.sort((a, b) => a.x - b.x);

  state.bubbles.forEach(bubble => {
    // Dot
    const dot = document.createElement('div');
    dot.className = 'timeline-dot';
    dot.style.left = bubble.x + 'px';
    canvas.appendChild(dot);

    // Wrapper
    const wrapper = document.createElement('div');
    wrapper.className = `bubble-wrapper ${bubble.side}`;
    wrapper.style.left = bubble.x + 'px';
    if (bubble.side === 'above') {
      wrapper.style.bottom = '50%';
      wrapper.style.top = 'auto';
    } else {
      wrapper.style.top = '50%';
    }
    wrapper.dataset.id = bubble.id;

    // Connector
    const conn = document.createElement('div');
    conn.className = 'connector';

    // Bubble
    const bEl = document.createElement('div');
    bEl.className = 'bubble';
    let linksHTML = bubble.links.map((l, li) =>
      `<span class="bubble-link" onclick="openEditor('${bubble.id}',${li})">${escHtml(l.label)}</span>`
    ).join('');
    bEl.innerHTML = `
      ${bubble.tag ? `<div class="bubble-tag">${escHtml(bubble.tag)}</div>` : ''}
      <div class="bubble-title">${escHtml(bubble.title)}</div>
      <div class="bubble-links">${linksHTML}</div>
      <div class="bubble-actions">
        <button class="bubble-action-btn" title="Modifier" onclick="editBubble('${bubble.id}')">✎</button>
        <button class="bubble-action-btn" title="Supprimer" onclick="deleteBubble('${bubble.id}')">✕</button>
      </div>
      <div class="context-dot"></div>
    `;

    if (bubble.side === 'above') {
      wrapper.appendChild(bEl);
      wrapper.appendChild(conn);
    } else {
      wrapper.appendChild(conn);
      wrapper.appendChild(bEl);
    }

    makeDraggable(wrapper, bubble);
    canvas.appendChild(wrapper);
  });

  // Add button at the end
  const lastX = state.bubbles[state.bubbles.length - 1]?.x ?? 0;
  const addBtn = document.createElement('button');
  addBtn.className = 'add-here-btn';
  addBtn.title = 'Ajouter une idée ici';
  addBtn.textContent = '+';
  addBtn.style.left = (lastX + 180) + 'px';
  addBtn.onclick = () => openBubbleModal();
  canvas.appendChild(addBtn);
}

// ========== DRAG ==========
function makeDraggable(wrapper, bubble) {
  let startX, startLeft, dragging = false;
  wrapper.addEventListener('mousedown', e => {
    if (e.target.closest('.bubble-actions, .bubble-link')) return;
    e.preventDefault();
    dragging = false;
    startX = e.clientX;
    startLeft = bubble.x;
    const wrapperRect = document.getElementById('timeline-wrapper').getBoundingClientRect();

    const onMove = e => {
      const dx = e.clientX - startX;
      if (Math.abs(dx) > 3) dragging = true;
      if (!dragging) return;
      wrapper.classList.add('dragging');
      const scrollLeft = document.getElementById('timeline-wrapper').scrollLeft;
      bubble.x = Math.max(40, startLeft + dx);
      wrapper.style.left = bubble.x + 'px';
      wrapper.style.zIndex = 50;
      // Move dot
      const dot = document.querySelector(`.timeline-dot[style*="${startLeft}px"]`) ||
        document.querySelectorAll('.timeline-dot')[state.bubbles.indexOf(bubble)];
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      wrapper.classList.remove('dragging');
      wrapper.style.zIndex = '';
      if (dragging) { render(); }
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });
}

// ========== BUBBLE MODAL ==========
let modalInsertX = null;

function openBubbleModal(x) {
  modalInsertX = x ?? null;
  state.editingBubble = null;
  document.getElementById('modal-title').textContent = 'Nouvelle idée';
  document.getElementById('bubble-title-input').value = '';
  document.getElementById('bubble-tag-input').value = '';
  document.getElementById('bubble-side-input').value = 'above';
  document.getElementById('links-editor').innerHTML = `
    <div class="link-row">
      <input type="text" placeholder="Nom du lien..." class="link-label-input">
      <button class="btn-ghost" onclick="addLinkRow()" style="padding:6px 10px">+</button>
    </div>`;
  document.getElementById('bubble-modal').classList.add('open');
  setTimeout(() => document.getElementById('bubble-title-input').focus(), 100);
}

function editBubble(id) {
  const b = state.bubbles.find(b => b.id === id);
  if (!b) return;
  state.editingBubble = id;
  document.getElementById('modal-title').textContent = 'Modifier l\'idée';
  document.getElementById('bubble-title-input').value = b.title;
  document.getElementById('bubble-tag-input').value = b.tag || '';
  document.getElementById('bubble-side-input').value = b.side;
  const editor = document.getElementById('links-editor');
  editor.innerHTML = '';
  b.links.forEach((l, i) => {
    const row = document.createElement('div');
    row.className = 'link-row';
    row.innerHTML = `<input type="text" class="link-label-input" value="${escHtml(l.label)}" placeholder="Nom du lien..."><button class="btn-ghost" onclick="addLinkRow()" style="padding:6px 10px">+</button>`;
    editor.appendChild(row);
  });
  if (b.links.length === 0) addLinkRow();
  document.getElementById('bubble-modal').classList.add('open');
}

function addLinkRow() {
  const editor = document.getElementById('links-editor');
  const row = document.createElement('div');
  row.className = 'link-row';
  row.innerHTML = `<input type="text" class="link-label-input" placeholder="Nom du lien..."><button class="btn-danger" onclick="this.parentElement.remove()" style="padding:6px 8px">✕</button>`;
  editor.appendChild(row);
  row.querySelector('input').focus();
}

function saveBubble() {
  const title = document.getElementById('bubble-title-input').value.trim();
  if (!title) { document.getElementById('bubble-title-input').focus(); return; }
  const tag = document.getElementById('bubble-tag-input').value.trim();
  const side = document.getElementById('bubble-side-input').value;
  const linkInputs = document.querySelectorAll('#links-editor .link-label-input');
  const links = Array.from(linkInputs).map(i => i.value.trim()).filter(Boolean).map(label => ({ label, content: '' }));

  if (state.editingBubble) {
    const b = state.bubbles.find(b => b.id === state.editingBubble);
    if (b) {
      // Preserve existing link content
      const oldLinks = b.links;
      b.title = title; b.tag = tag; b.side = side;
      b.links = links.map((l, i) => ({
        label: l.label,
        content: (oldLinks[i] && oldLinks[i].label === l.label) ? oldLinks[i].content : (oldLinks.find(o=>o.label===l.label)?.content || '')
      }));
    }
  } else {
    const GAP = 220, MARGIN = 80;
    let x = modalInsertX ?? (state.bubbles.length === 0 ? MARGIN : Math.max(...state.bubbles.map(b => b.x)) + GAP);
    state.bubbles.push({ id: 'b' + state.nextId++, title, tag, side, x, links });
  }

  closeModal('bubble-modal');
  render();
}

// ========== PARKING ==========
function openParkingModal() {
  document.getElementById('parking-input').value = '';
  document.getElementById('parking-modal').classList.add('open');
  setTimeout(() => document.getElementById('parking-input').focus(), 100);
}

function saveParking() {
  const text = document.getElementById('parking-input').value.trim();
  if (!text) return;
  state.parking.push({ id: 'p' + state.nextId++, text });
  closeModal('parking-modal');
  render();
}

function deleteParking(id) {
  state.parking = state.parking.filter(p => p.id !== id);
  render();
}

function promoteParking(id) {
  const p = state.parking.find(p => p.id === id);
  if (!p) return;
  deleteParking(id);
  // Pre-fill modal
  document.getElementById('bubble-title-input').value = p.text;
  document.getElementById('bubble-tag-input').value = '';
  document.getElementById('bubble-side-input').value = 'above';
  document.getElementById('links-editor').innerHTML = `<div class="link-row"><input type="text" class="link-label-input" placeholder="Nom du lien..."><button class="btn-ghost" onclick="addLinkRow()" style="padding:6px 10px">+</button></div>`;
  state.editingBubble = null;
  document.getElementById('modal-title').textContent = 'Ajouter à la frise';
  document.getElementById('bubble-modal').classList.add('open');
}

function toggleParking() {
  document.getElementById('parking-zone').classList.toggle('collapsed');
}

// ========== DELETE BUBBLE ==========
function deleteBubble(id) {
  if (!confirm('Supprimer cette idée et tous ses liens ?')) return;
  state.bubbles = state.bubbles.filter(b => b.id !== id);
  render();
}

// ========== EDITOR ==========
let saveTimeout;

function openEditor(bubbleId, linkIndex) {
  const bubble = state.bubbles.find(b => b.id === bubbleId);
  if (!bubble) return;
  const link = bubble.links[linkIndex];
  if (!link) return;
  state.currentEditorKey = `${bubbleId}-${linkIndex}`;
  document.getElementById('editor-title').textContent = `${bubble.title} → ${link.label}`;
  document.getElementById('editor-content').innerHTML = link.content || '';
  document.getElementById('editor-panel').classList.add('open');
  document.getElementById('save-status').textContent = '● Sauvegardé';
  document.getElementById('save-status').className = 'saved-indicator';
  document.getElementById('editor-content').focus();
}

function closeEditor() {
  document.getElementById('editor-panel').classList.remove('open');
  autoSaveEditor();
  state.currentEditorKey = null;
}

document.getElementById('editor-content').addEventListener('input', () => {
  document.getElementById('save-status').textContent = '○ Modifications…';
  document.getElementById('save-status').className = '';
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(autoSaveEditor, 800);
});

function autoSaveEditor() {
  if (!state.currentEditorKey) return;
  const [bubbleId, liStr] = state.currentEditorKey.split('-');
  const li = parseInt(liStr);
  const bubble = state.bubbles.find(b => b.id === bubbleId);
  if (!bubble || !bubble.links[li]) return;
  bubble.links[li].content = document.getElementById('editor-content').innerHTML;
  saveState();
  document.getElementById('save-status').textContent = '● Sauvegardé';
  document.getElementById('save-status').className = 'saved-indicator';
}

function clearEditor() {
  if (!confirm('Effacer tout le contenu de cet onglet ?')) return;
  document.getElementById('editor-content').innerHTML = '';
  autoSaveEditor();
}

function execCmd(cmd, val) {
  document.getElementById('editor-content').focus();
  document.execCommand(cmd, false, val || null);
}
function insertHR() { execCmd('insertHTML', '<hr style="border:none;border-top:1px solid #2a2a35;margin:16px 0">'); }

// ========== MODAL HELPERS ==========
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) closeModal(m.id); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(m => closeModal(m.id));
    if (document.getElementById('editor-panel').classList.contains('open')) closeEditor();
  }
  if ((e.key === 'Enter') && document.getElementById('bubble-modal').classList.contains('open')) {
    if (document.activeElement.tagName !== 'BUTTON') saveBubble();
  }
  if ((e.key === 'Enter') && document.getElementById('parking-modal').classList.contains('open')) {
    if (document.activeElement.tagName !== 'BUTTON') saveParking();
  }
});

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ========== INIT ==========
loadState();
render();
</script>
</body>
